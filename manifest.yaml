name: hermes-dev-pipeline-kit
version: 0.5.5
description: >
  Portable Hermes workflow skills for development pipeline orchestration.
  Hermes as PM/architect/QA, ClaudeCode as executor, Codex as review gate.

entrypoints:
  agent_bootstrap: BOOTSTRAP.md
  human_readme: README.md
  agent_install_guide: docs/agent-install.md
  install: scripts/install.sh
  install_deps: scripts/install-deps.sh
  doctor: scripts/doctor.sh
  ci_local: scripts/ci-local.sh
  append_event: scripts/append-event.sh
  transition_check: scripts/transition-check.sh
  replay_run: scripts/replay-run.sh
  run_init: scripts/run-init.sh
  record_command: scripts/record-command.sh
  validate_worker_result: scripts/validate-worker-result.sh
  record_worker_result: scripts/record-worker-result.sh
  normalize_worker_result: scripts/normalize-worker-result.sh
  invoke_worker_dry_run: scripts/invoke-worker-dry-run.sh
  simulate_worker_output: scripts/simulate-worker-output.sh
  drive_s_run: scripts/drive-s-run.sh
  generate_run_state: scripts/generate-run-state.sh
  final_report: scripts/final-report.sh
  fail_run: scripts/fail-run.sh
  plugin_wrapper: plugins/hermes-evidence-runtime
  plugin_wrapper_smoke: scripts/smoke/smoke-plugin-wrapper.sh
  plugin_discovery_smoke: scripts/smoke/smoke-plugin-discovery-temp-home.sh
  plugin_hooks_source_smoke: scripts/smoke/smoke-plugin-hooks-source.sh
  plugin_hooks_discovery_smoke: scripts/smoke/smoke-plugin-hooks-discovery-temp-home.sh
  worker_result_contract_smoke: scripts/smoke/smoke-worker-result-contract.sh
  worker_result_invalid_acceptance_smoke: scripts/smoke/smoke-worker-result-invalid-acceptance.sh
  worker_normalizer_smoke: scripts/smoke/smoke-worker-normalizer.sh
  worker_normalizer_run_state_smoke: scripts/smoke/smoke-worker-normalizer-to-run-state.sh
  worker_dry_run_disabled_smoke: scripts/smoke/smoke-worker-dry-run-disabled.sh
  worker_dry_run_run_state_smoke: scripts/smoke/smoke-worker-dry-run-to-run-state.sh
  worker_dry_run_real_optional_smoke: scripts/smoke/smoke-worker-dry-run-real-optional.sh
  uninstall: scripts/uninstall.sh
  manifest: manifest.yaml

skills:
  hermes:
    required:
      - path: skills/software-development/dev-pipeline-orchestrator
        install_to: "~/.hermes/skills/software-development/dev-pipeline-orchestrator"
        description: Main development task entrypoint with pipeline orchestration
      - path: skills/software-development/dev-pipeline-report
        install_to: "~/.hermes/skills/software-development/dev-pipeline-report"
        description: Final evidence/verification report format

plugins:
  experimental:
    - path: plugins/hermes-evidence-runtime
      name: hermes-evidence-runtime
      version: 0.5.5
      install_to: "~/.hermes/plugins/hermes-evidence-runtime"
      default_install: false
      description: >
        Experimental plugin wrapper that registers tools around existing Bash
        harness scripts. v0.5.2 also includes prototype non-blocking hook probes
        that log only when HERMES_EVIDENCE_HOOK_LOG_DIR is set. It does not
        implement a memory provider, replacement skills, or official
        ClaudeCode/Codex/OpenCode output capture. v0.5.3 adds worker result
        contract adapter tools for simulated worker output only. v0.5.4 adds a
        normalizer for caller-supplied or simulated worker output. v0.5.5 adds
        an explicit worker dry-run wrapper; real invocation is optional and
        disabled by default, and default CI records skipped invocation evidence
        only. It still does not claim official worker capture. It is
        source-validated and temp-HOME discovery validated, but is not installed
        into real ~/.hermes/plugins by default.
      provides_tools:
        - evidence_doctor
        - evidence_active_run_status
        - evidence_run_init
        - evidence_drive_s_run
        - evidence_validate_worker_result
        - evidence_record_worker_result
        - evidence_normalize_worker_result
        - evidence_invoke_worker_dry_run
      provides_hooks:
        - pre_tool_call
        - post_tool_call
        - on_session_end
        - on_session_finalize
        - subagent_stop

protocols:
  claude_code:
    required_protocol: protocols/claude-delegation-protocol.md
    target_hint: "~/.claude/CLAUDE.md"
    description: >
      Hermes Delegation Protocol — teaches ClaudeCode to obey work orders
      from dev-pipeline-orchestrator. The installer checks if this protocol
      exists in ~/.claude/CLAUDE.md and warns if missing, but never overwrites.

dependencies:
  required_tools:
    - name: git
      source: system
      auto_install: false
      description: Version control, required for clone and skill management
    - name: bash
      source: system
      auto_install: false
      description: Shell interpreter for install/doctor/uninstall scripts
    - name: grep
      source: system
      auto_install: false
      description: Pattern matching for doctor checks and CI

  recommended_hermes_skills:
    - name: gstack
      source: https://github.com/garrytan/gstack
      auto_install: approval_required
      description: >
        Provides plan-eng-review, plan-ceo-review, investigate, ship, review,
        retro, and other development workflow skills used by dev-pipeline-orchestrator.
        Install requires user approval.

  recommended_claude_code_skills:
    - name: mattpocock-skills
      source: https://github.com/mattpocock/skills
      auto_install: approval_required
      description: >
        Matt Pocock's skills (tdd, diagnose, prototype, to-issues, grill-me)
        used by ClaudeCode when executing work orders.
        Install requires user approval.

  optional_tools:
    - name: gh
      source: https://cli.github.com/
      auto_install: false
      description: >
        GitHub CLI for repo creation, push, PR operations.
        Used by GitHub Publish / Project Bootstrap Lane.
        Not required for core pipeline functionality.

safety:
  never_commit_secrets: true
  never_git_add_all: true
  never_overwrite_claude_md: true
  require_approval_for_dependency_install: true
  require_approval_for_push_or_repo_create: true
  require_approval_for_claude_md_modification: true
  installer_modifies:
    - "~/.hermes/skills/software-development/dev-pipeline-orchestrator"
    - "~/.hermes/skills/software-development/dev-pipeline-report"
  installer_does_not_modify:
    - "~/.hermes/plugins"  # v0.5.5 plugin wrapper is source-only / experimental
    - "~/.claude/CLAUDE.md"  # only warns, never writes
    - "~/.claude/settings.json"
    - "any business project"
    - "any git remote"
    - "any environment variable"
